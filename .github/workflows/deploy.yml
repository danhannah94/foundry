name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Foundry
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Inject content config
        run: echo "${{ secrets.FOUNDRY_CONFIG }}" > foundry.config.yaml

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a foundry-claymore
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
