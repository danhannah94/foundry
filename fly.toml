# Foundry — Fly.io Configuration
# Deploy: flyctl deploy --remote-only
# Docs: https://fly.io/docs/reference/configuration/

app = 'foundry-claymore'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'foundry_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
