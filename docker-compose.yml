services:
  foundry:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - foundry-data:/data
    environment:
      - PORT=3001
      - FOUNDRY_DB_PATH=/data/foundry.db
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  foundry-data: